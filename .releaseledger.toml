# Project-local releaseledger configuration.
# This file lives in the source project root.
config_version = 1
releaseledger_dir = ".releaseledger"

# Branch-scoped release state. This block is safe to commit.
ledger_ref = "main"
ledger_parent_ref = ""
ledger_next_entry_number = 1
ledger_branch_guard = "off"

# Cross-ledger identity. Local record IDs stay unchanged; global refs are derived.
[ledger]
code = "rl"
name = "releaseledger"

# Release defaults.
[release]
default_changelog = "CHANGELOG.md"
default_status = "planned"
allow_dirty_worktree = true
# Changelog build defaults.
[changelog]
output = "CHANGELOG.md"
standard = "keepachangelog-1.1.0"
group_mode = "keepachangelog"
link_references = true
repository_url = ""
tag_prefix = "v"
compare_url_template = ""
release_url_template = ""
preamble = ""
semver = true
unreleased = true
trim = true
render_always = false
header = ""
body = """
## [{{ release.version }}] - {% if release.date %}{{ release.date }}{% else %}Unreleased{% endif %}{% if release.yanked %} [YANKED]{% endif %}

{% for group in groups %}
### {{ group.title }}
{% for entry in group.entries %}
- {% if entry.breaking %}**BREAKING:** {% endif %}{{ entry.summary }}
{% endfor %}

{% endfor %}
"""
footer = "<!-- generated by releaseledger -->"
postprocessors = []

# Git-first release evidence. Git is optional: releaseledger keeps
# working outside a git worktree and only git-specific commands warn.
[git]
enabled = true
default_base = "previous_release_tag"
default_head = "HEAD"
previous_tag_patterns = ["v{version}", "{version}"]
include_merges = "nontrivial"
require_clean_worktree = false
max_commits = 500
max_diff_chars_per_commit = 12000
candidate_status = "draft"
